steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nash-equilibrium-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nash-equilibrium-backend:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nash-equilibrium-backend:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nash-equilibrium-backend'
      - '--image=gcr.io/$PROJECT_ID/nash-equilibrium-backend:$SHORT_SHA'
      - '--region=us-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_USER=${_SMTP_USER},SMTP_PASS=${_SMTP_PASS},SMTP_FROM=${_SMTP_FROM},GCS_BUCKET_NAME=${_GCS_BUCKET_NAME},ADMIN_SECRET=${_ADMIN_SECRET},AUTH_SECRET=${_AUTH_SECRET},TRUST_PROXY=${_TRUST_PROXY}'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=3600'

images:
  - 'gcr.io/$PROJECT_ID/nash-equilibrium-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/nash-equilibrium-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY

# Substitutions for environment variables (set these in Cloud Build trigger)
# Do NOT hardcode real values here — configure them in the Cloud Build trigger UI instead
substitutions:
  _SMTP_HOST: 'smtp.gmail.com'
  _SMTP_PORT: '465'
  _SMTP_USER: 'your-email@gmail.com'
  _SMTP_PASS: 'your-app-password-here'
  _SMTP_FROM: '"Nash Equilibrium Simulator" <your-email@gmail.com>'
  _GCS_BUCKET_NAME: 'your-gcs-bucket-name'
  # Secret for the admin stats endpoint. Intentionally empty here: set the real
  # value in the Cloud Build trigger UI. If left unset, the admin endpoint stays
  # fail-closed (401 for everyone) rather than deploying a repo-known placeholder.
  _ADMIN_SECRET: ''
  # Stable HMAC key for signing auth session tokens. Intentionally empty here:
  # set the real value (generate with `openssl rand -hex 32`) in the Cloud Build
  # trigger UI. If left unset the app falls back to a random per-boot key — safe
  # but sessions reset on every restart/redeploy — never a repo-known placeholder.
  _AUTH_SECRET: ''
  # Trust the Cloud Run front-end proxy so rate limiting keys on the real client
  # IP (req.ip) rather than the proxy. "1" = trust one hop, correct for Cloud Run.
  _TRUST_PROXY: '1'
