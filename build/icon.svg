<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#12103a"/>
      <stop offset="100%" stop-color="#080d24"/>
    </linearGradient>
    <radialGradient id="atm" cx="512" cy="512" r="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>

    <!--
      CENTERED + SCALED projection:
        Origin O = (512, 650)  ← shifted up so cube center hits (512,512)
        Unit x  = (+392, +98)
        Unit y  = (-392, +98)
        Unit z  = (0, -472)

      Box vertices:
        O    = (512, 650)
        X1   = (904, 748)
        Y1   = (120, 748)
        XY   = (512, 846)   ← front-bottom
        Z1   = (512, 178)   ← top-back
        XZ   = (904, 276)
        YZ   = (120, 276)
        XYZ  = (512, 374)

      Visual center of box: y=(178+846)/2=512, x=512 ✓

      Surfaces (z_A/z_B normalized 0→1, 0.5*zUnit=(0,-236)):
        Blue  corners: O(512,650)  XZ(904,276)   XY(512,846)  (120,512)
        Orange corners: O(512,650) (904,512)      XY(512,846)  YZ(120,276)

      Markers:
        Red sphere   : center (258, 451), r=29  — on orange surface
        Purple diamond: center (571, 637), half=26 — both surfaces cross here
        Green diamonds: XZ(904,276) and YZ(120,276), half=24
    -->

    <!-- Surface gradients -->
    <linearGradient id="blue-grad" x1="904" y1="276" x2="350" y2="846" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="120" y1="276" x2="760" y2="846" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="55%" stop-color="#f97316" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#9a3412" stop-opacity="0.28"/>
    </linearGradient>

    <!-- 3D sphere gradient -->
    <radialGradient id="sphere-grad" cx="33%" cy="26%" r="68%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#fff1f2"/>
      <stop offset="18%"  stop-color="#fca5a5"/>
      <stop offset="52%"  stop-color="#ef4444"/>
      <stop offset="82%"  stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>

    <!-- Clip: surface drawn OVER lower half of each marker -->
    <clipPath id="clip-over-sphere">
      <rect x="0" y="451" width="1024" height="600"/>
    </clipPath>
    <clipPath id="clip-over-diamond">
      <rect x="0" y="637" width="1024" height="400"/>
    </clipPath>

    <!-- Glow filters -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sm-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="surf-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="9" flood-color="#000030" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#atm)"/>

  <!-- ── WIREFRAME BOX ── -->
  <polygon points="512,650 904,748 512,846 120,748"
    fill="none" stroke="#34d399" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.40"/>
  <polygon points="512,178 904,276 512,374 120,276"
    fill="none" stroke="#34d399" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.40"/>
  <line x1="512" y1="650" x2="512" y2="178" stroke="#34d399" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.30"/>
  <line x1="904" y1="748" x2="904" y2="276" stroke="#34d399" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.40"/>
  <line x1="120" y1="748" x2="120" y2="276" stroke="#34d399" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.40"/>
  <line x1="512" y1="846" x2="512" y2="374" stroke="#34d399" stroke-width="2.5" stroke-dasharray="12,7" opacity="0.40"/>

  <!-- LAYER 1 — Surfaces behind markers -->
  <polygon points="512,650 904,512 512,846 120,276"
    fill="url(#orange-grad)" opacity="0.60"
    stroke="#f97316" stroke-width="1.5" stroke-opacity="0.45"
    filter="url(#surf-shadow)"/>
  <polygon points="512,650 904,276 512,846 120,512"
    fill="url(#blue-grad)" opacity="0.62"
    stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.45"
    filter="url(#surf-shadow)"/>

  <!-- LAYER 2 — Marker back-halves (shadow side) -->
  <!-- Sphere back: dark below equator y=451 -->
  <circle cx="258" cy="451" r="29" clip-path="url(#clip-over-sphere)" fill="#5c0000" opacity="0.92"/>
  <!-- Diamond back: lower facets, before surface overlay -->
  <polygon points="597,637 571,663 571,637" fill="#3b0764"/>
  <polygon points="545,637 571,663 571,637" fill="#2e1065"/>

  <!-- LAYER 3 — Surfaces crossing THROUGH markers (blend mode creates color tinting) -->
  <polygon points="512,650 904,512 512,846 120,276"
    fill="url(#orange-grad)"
    clip-path="url(#clip-over-sphere)"
    opacity="0.72" style="mix-blend-mode: overlay"/>
  <polygon points="512,650 904,512 512,846 120,276"
    fill="url(#orange-grad)"
    clip-path="url(#clip-over-diamond)"
    opacity="0.65" style="mix-blend-mode: overlay"/>
  <polygon points="512,650 904,276 512,846 120,512"
    fill="url(#blue-grad)"
    clip-path="url(#clip-over-diamond)"
    opacity="0.65" style="mix-blend-mode: overlay"/>

  <!-- LAYER 4 — Marker front-halves (bright, on top of surfaces) -->
  <!-- Red sphere (full 3D gradient; front hemisphere dominates visually) -->
  <g filter="url(#glow)">
    <circle cx="258" cy="451" r="29" fill="url(#sphere-grad)" opacity="0.95"/>
    <ellipse cx="247" cy="439" rx="9" ry="7" fill="white" opacity="0.30"/>
    <circle cx="245" cy="436" r="3.5" fill="white" opacity="0.44"/>
  </g>

  <!-- Purple diamond front facets (brighter, drawn on top) -->
  <g filter="url(#sm-glow)">
    <polygon points="571,611 597,637 571,637" fill="#f3e8ff"/>
    <polygon points="545,637 571,611 571,637" fill="#d8b4fe"/>
    <polygon points="597,637 571,663 571,637" fill="#a855f7" opacity="0.85"/>
    <polygon points="545,637 571,663 571,637" fill="#7e22ce" opacity="0.85"/>
    <polygon points="571,611 597,637 571,663 545,637"
      fill="none" stroke="#f5f3ff" stroke-width="1.5" opacity="0.55"/>
  </g>

  <!-- ── GREEN DIAMONDS (3D faceted) at XZ(904,276) and YZ(120,276), half=24 ── -->
  <g filter="url(#sm-glow)">
    <polygon points="904,252 928,276 904,276" fill="#bbf7d0"/>
    <polygon points="928,276 904,300 904,276" fill="#4ade80"/>
    <polygon points="904,300 880,276 904,276" fill="#15803d"/>
    <polygon points="880,276 904,252 904,276" fill="#86efac"/>
    <polygon points="904,252 928,276 904,300 880,276"
      fill="none" stroke="#f0fdf4" stroke-width="1.5" opacity="0.6"/>
  </g>
  <g filter="url(#sm-glow)">
    <polygon points="120,252 144,276 120,276" fill="#bbf7d0"/>
    <polygon points="144,276 120,300 120,276" fill="#4ade80"/>
    <polygon points="120,300  96,276 120,276" fill="#15803d"/>
    <polygon points=" 96,276 120,252 120,276" fill="#86efac"/>
    <polygon points="120,252 144,276 120,300  96,276"
      fill="none" stroke="#f0fdf4" stroke-width="1.5" opacity="0.6"/>
  </g>

</svg>
